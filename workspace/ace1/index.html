<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>ace1 — WebAR</title>
  <meta name="description" content="Experiencia WebAR — ace1"/>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
    async crossorigin="anonymous" data-preload-chunks="slam"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@latest/dist/xrextras.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:100vw;height:100vh;overflow:hidden;background:#000}
    #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
      justify-content:center;background:linear-gradient(135deg,#0a0a0a,#1a1a2e);
      z-index:9999;color:#fff;font-family:system-ui;transition:opacity .5s}
    #splash.hidden{opacity:0;pointer-events:none}
    .ring{width:52px;height:52px;border:3px solid rgba(99,102,241,.2);border-top-color:#6366f1;
      border-radius:50%;animation:spin .8s linear infinite;margin-bottom:18px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .txt{font-size:13px;color:rgba(255,255,255,.6);letter-spacing:2px;text-transform:uppercase}
    
  </style>
</head>
<body>
  <div id="splash"><div class="ring"></div><div class="txt">Iniciando AR</div></div>
  
  <a-scene
    xrweb="allowedDevices="any""
    xrextras-loading xrextras-runtime-error
    renderer="colorManagement:true;physicallyCorrectLights:true"
    vr-mode-ui="enabled:false">
    <a-assets>
      <a-asset-item id="m" src="./model.glb"></a-asset-item>
    </a-assets>
    
    <a-entity position="0 -1.3 -3">
      <a-entity gltf-model="#m" scale=".5 .5 .5"
        animation="property:rotation;to:0 360 0;loop:true;dur:8000;easing:linear"
        animation__bob="property:position;dir:alternate;dur:2000;easing:easeInOutSine;loop:true;to:0 .15 0">
      </a-entity>
    </a-entity>
    <a-entity light="type:ambient;intensity:1.2"></a-entity>
    <a-entity light="type:directional;intensity:.8" position="1 4 2"></a-entity>
    <a-camera active="false" position="0 0 0"></a-camera>
  </a-scene>
  <script>
    document.querySelector('a-scene').addEventListener('loaded',()=>{
      const s=document.getElementById('splash');s.classList.add('hidden');setTimeout(()=>s.remove(),600)
    })
    
  </script>
</body>
</html>
